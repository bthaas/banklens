<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankLens</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #1f2933;
        }

        .container {
            max-width: 520px;
            margin: 80px auto;
            background: #ffffff;
            border: 1px solid #d9e2ec;
            border-radius: 10px;
            padding: 30px;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 28px;
        }

        p {
            margin: 0 0 24px;
            color: #52606d;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="file"] {
            width: 100%;
            margin-bottom: 18px;
        }

        button {
            background: #2f6fed;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #215fd6;
        }

        .error {
            margin-bottom: 18px;
            background: #ffe3e3;
            border: 1px solid #ffb3b3;
            color: #a61b1b;
            padding: 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BankLens</h1>
        <p>Upload your bank statement CSV to analyze spending and categories.</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data">
            <label for="file">Bank Statement CSV</label>
            <input id="file" name="file" type="file" accept=".csv" required>
            <button type="submit">Analyze Statement</button>
        </form>
    </div>
</body>
</html>
